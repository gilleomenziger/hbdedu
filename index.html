<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GIF Klick</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        img {
            max-width: 90vw;
            max-height: 90vh;
            cursor: pointer;
        }
    </style>
</head>
<body>

<img id="gif" src="gif1.gif" alt="GIF">

<script>
const gifs = [
    "EDU-1.gif",
    "EDU-2.gif",
];

let index = 0;

document.getElementById("gif").addEventListener("click", function () {
    index++;

    if (index < gifs.length) {
        this.src = gifs[index];
    }
});
</script>

</body>
</html>
